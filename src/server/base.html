<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Manager UI</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
    background: #334155;
    color: white;
}

button {
    margin-top: 12px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.task {
    background: #334155;
    margin-top: 12px;
    padding: 15px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.task-info {
    max-width: 70%;
}

.priority-high { color: #ef4444; }
.priority-medium { color: #f59e0b; }
.priority-low { color: #22c55e; }

.delete {
    background: #ef4444;
}

.delete:hover {
    background: #dc2626;
}
</style>
</head>

<body>

<div class="container">
    <h1>🛠 Service Manager</h1>

    <div class="card">
        <h3>Neue Aufgabe</h3>
        <input type="text" id="title" placeholder="Titel">
        <textarea id="description" placeholder="Beschreibung"></textarea>
        <input type="datetime-local" id="dueDate">
        <select id="priority">
            <option value="low">Niedrig</option>
            <option value="medium">Mittel</option>
            <option value="high">Hoch</option>
        </select>
        <button onclick="addTask()">Hinzufügen</button>
    </div>

    <div id="taskList"></div>
</div>

<script>
let tasks = [];

function addTask() {
    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const dueDate = document.getElementById("dueDate").value;
    const priority = document.getElementById("priority").value;

    if (!title) return alert("Titel fehlt!");

    const task = {
        id: Date.now(),
        title,
        description,
        dueDate,
        priority
    };

    tasks.push(task);
    renderTasks();
}

function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    renderTasks();
}

function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "task";

        div.innerHTML = `
            <div class="task-info">
                <strong>${task.title}</strong><br>
                <small>${task.description}</small><br>
                <small>📅 ${task.dueDate}</small><br>
                <small class="priority-${task.priority}">
                    Priorität: ${task.priority}
                </small>
            </div>
            <button class="delete" onclick="deleteTask(${task.id})">X</button>
        `;

        list.appendChild(div);
    });
}
</script>

</body>
</html>
